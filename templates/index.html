<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculateur de Factorielle</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Calculateur de Factorielle - Version 2</h1>
            <button id="theme-toggle">Mode Sombre</button>
        </header>
        <main id="main-content">
            <div class="calculator">
                <form id="factorial-form">
                    <label for="number">Entrez un entier positif :</label>
                    <input type="number" id="number" name="number" min="0" required>
                    <button type="submit">Calculer la factorielle</button>
                </form>
                <div id="result-area">
                    <h2>Résultat :</h2>
                    <p id="result"></p>
                </div>
            </div>
            <div class="controls">
                <button id="restart-btn">Recommencer</button>
                <button id="quit-btn">Quitter</button>
            </div>
        </main>
        <div id="quit-message" style="display: none;">
            <h2>Au revoir !</h2>
            <p>Vous pouvez fermer cet onglet.</p>
        </div>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
